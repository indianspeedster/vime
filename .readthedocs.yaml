version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  apt_packages:
    - pandoc
  jobs:
    install:
      - pip install -r docs/requirements.txt
    build:
      html:
        - |
          mkdir -p "$READTHEDOCS_OUTPUT/html"
          if [ "${READTHEDOCS_LANGUAGE:-en}" = "zh-cn" ]; then
            VIME_DOC_LANG=zh sphinx-build -b html -D language=zh -c docs docs/zh "$READTHEDOCS_OUTPUT/html"
          else
            VIME_DOC_LANG=en sphinx-build -b html -D language=en -c docs docs/en "$READTHEDOCS_OUTPUT/html"
          fi
